<section class="transaction-list-container">
  <header class="list-header">
    <img src="assets/icons/briefcase.png" alt="" class="header-icon" />
    <h2>Recent Transactions</h2>
  </header>

  <div class="controls-row">
    <div class="search-input-wrapper">
      <input
        type="text"
        placeholder="Search by typing..."
        (input)="onSearchChange(search.value)"
        #search
      />
      @if (search.value) {
      <button class="clear-btn" (click)="search.value = ''; onSearchChange('')">×</button>
      }
    </div>

    <div class="sort-controls">
      <span>Sort by</span>
      <div class="btn-group">
        @for (option of sortCriterias; track option) {
        <button
          [class.active]="transactionService.sortBy() === option"
          (click)="transactionService.toggleSort(option)"
        >
          {{ option | uppercase }}
          @if (transactionService.sortBy() === option) {
          <span class="arrow" [class.asc]="transactionService.sortDirection() === 'asc'">▾</span>
          }
        </button>
        }
      </div>
    </div>
  </div>

  <div class="items-list">
    @for (item of transactionService.filteredTransactions(); track item.transactionDate) {
    <app-transaction-item [transaction]="item" [style.--category-color]="item.categoryCode" />
    } @empty {
    <p class="no-results">No transactions found matching your search.</p>
    }
  </div>
</section>
